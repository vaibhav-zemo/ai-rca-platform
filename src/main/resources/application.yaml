spring:
  application:
    name: ai-rca-platform

  # 1. Database Connections
  datasource:
    url: jdbc:postgresql://localhost:5432/rca_db
    username: rca_user
    password: rca_password
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always # Forces execution of your schema.sql layout
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  # 2. Automated Vector Store Provisioning
  ai:
    vectorstore:
      pgvector:
        table-name: vector_store_records
        initialize-schema: true # Tells Spring AI to auto-generate this table
        dimensions: 1536        # Standard dimension size for Gemini embeddings

    # 3. Google GenAI Gateway Options
    google:
      genai:
        api-key: ${SPRING_AI_GOOGLE_GENAI_API_KEY}
        chat:
          model: gemini-2.5-flash
        embedding:
          text:
            model: gemini-embedding-001
            dimensions: 1536
          api-key: ${SPRING_AI_GOOGLE_GENAI_API_KEY}

  # 4. Local Kafka Broker Boundaries
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: rca-debug-group
      auto-offset-reset: earliest
